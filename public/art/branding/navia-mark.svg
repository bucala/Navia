<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="markBg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#3b2c1e"/>
      <stop offset="55%" stop-color="#241b13"/>
      <stop offset="100%" stop-color="#120d08"/>
    </radialGradient>
    <linearGradient id="markFire" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe58a"/>
      <stop offset="45%" stop-color="#f6a723"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="markBevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7a5a35"/>
      <stop offset="100%" stop-color="#3a2a18"/>
    </linearGradient>
    <filter id="markGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stone plaque -->
  <rect width="512" height="512" rx="108" fill="url(#markBg)"/>
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="url(#markBevel)" stroke-width="8" opacity="0.8"/>
  <rect x="34" y="34" width="444" height="444" rx="82" fill="none" stroke="#000" stroke-width="3" opacity="0.35"/>

  <!-- Rune tick marks around the rim -->
  <g stroke="#c9a15a" stroke-width="6" stroke-linecap="round" opacity="0.75">
    <line x1="256" y1="46" x2="256" y2="70"/>
    <line x1="200" y1="52" x2="212" y2="74"/>
    <line x1="312" y1="52" x2="300" y2="74"/>
    <line x1="256" y1="466" x2="256" y2="442"/>
    <line x1="200" y1="460" x2="212" y2="438"/>
    <line x1="312" y1="460" x2="300" y2="438"/>
    <line x1="46" y1="256" x2="70" y2="256"/>
    <line x1="466" y1="256" x2="442" y2="256"/>
  </g>

  <!-- Rune "N" monogram, glowing -->
  <g filter="url(#markGlow)">
    <path
      d="M176 356 L176 156 L216 156 L296 296 L296 156 L336 156 L336 356 L296 356 L216 216 L216 356 Z"
      fill="#1a1108" stroke="#1a1108" stroke-width="18" stroke-linejoin="round"/>
    <path
      d="M176 356 L176 156 L216 156 L296 296 L296 156 L336 156 L336 356 L296 356 L216 216 L216 356 Z"
      fill="url(#markFire)"/>
  </g>

  <!-- Small ember accent below, echo of the die-and-star mark -->
  <g transform="translate(256 412)">
    <path d="M0 -20l7 15 17 2-12 12 3 17-15-8-15 8 3-17-12-12 17-2z" fill="#fbbf24"/>
  </g>
</svg>
