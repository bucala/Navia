<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 300" width="100%" height="100%">
  <defs>
    <linearGradient id="flagRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="50%" stop-color="#991b1b" />
      <stop offset="100%" stop-color="#450a0a" />
    </linearGradient>
    <linearGradient id="shieldGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#78350f" />
    </linearGradient>
  </defs>

  <!-- Ground Shadow -->
  <ellipse cx="90" cy="280" rx="60" ry="15" fill="#000000" opacity="0.65" />

  <!-- Wooden Spear Pole -->
  <line x1="90" y1="20" x2="90" y2="280" stroke="#451a03" stroke-width="8" stroke-linecap="round" />
  <!-- Spear Spearhead -->
  <polygon points="90,5 98,25 90,30 82,25" fill="#d1d5db" stroke="#374151" stroke-width="1.5" />

  <!-- Hanging War Banner Cloth -->
  <path d="M 90 40 Q 130 50 160 45 L 155 210 L 125 185 L 90 220 Z" fill="url(#flagRed)" stroke="#7f1d1d" stroke-width="2" />
  <!-- Gold Fringe / Trim -->
  <path d="M 90 40 Q 130 50 160 45" stroke="#fbbf24" stroke-width="4" fill="none" />
  <path d="M 155 210 L 125 185 L 90 220" stroke="#fbbf24" stroke-width="3" fill="none" />

  <!-- Gold Emblem on Banner -->
  <polygon points="125,90 140,115 125,140 110,115" fill="#f59e0b" stroke="#fef08a" stroke-width="1.5" />

  <!-- Leaning Round Iron Shield at Base -->
  <g transform="translate(65, 230) rotate(-15)">
    <circle cx="0" cy="0" r="42" fill="#374151" stroke="url(#shieldGold)" stroke-width="5" />
    <circle cx="0" cy="0" r="32" fill="#1f2937" stroke="#d97706" stroke-width="1.5" />
    <!-- Boss -->
    <circle cx="0" cy="0" r="12" fill="url(#shieldGold)" />
    <!-- Cross reinforcement -->
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#d97706" stroke-width="2" />
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#d97706" stroke-width="2" />
  </g>
</svg>
