<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="100%" height="100%">
  <defs>
    <linearGradient id="altarStone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46" />
      <stop offset="50%" stop-color="#27272a" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    <radialGradient id="altarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#78350f" stop-opacity="0" />
    </radialGradient>
    <filter id="altarFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Shadow -->
  <ellipse cx="120" cy="150" rx="105" ry="25" fill="#000000" opacity="0.7" />

  <!-- Base Stone Steps -->
  <ellipse cx="120" cy="145" rx="100" ry="22" fill="#18181b" stroke="#52525b" stroke-width="2" />
  <ellipse cx="120" cy="135" rx="85" ry="18" fill="#27272a" stroke="#71717a" stroke-width="2" />
  <ellipse cx="120" cy="120" rx="70" ry="15" fill="url(#altarStone)" stroke="#a1a1aa" stroke-width="2.5" />

  <!-- Center Glowing Magic Circle -->
  <ellipse cx="120" cy="120" rx="55" ry="11" fill="url(#altarGlow)" filter="url(#altarFilter)" />
  <ellipse cx="120" cy="120" rx="48" ry="9" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Glowing Central Orb -->
  <circle cx="120" cy="115" r="10" fill="#fef08a" filter="url(#altarFilter)" />
  <circle cx="120" cy="115" r="5" fill="#ffffff" />

  <!-- Runic Ring Accents -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
    <line x1="80" y1="120" x2="90" y2="120" />
    <line x1="150" y1="120" x2="160" y2="120" />
    <line x1="120" y1="110" x2="120" y2="105" />
    <line x1="120" y1="130" x2="120" y2="135" />
  </g>
</svg>
