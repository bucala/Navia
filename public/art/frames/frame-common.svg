<!--
  Card frame template — Common rarity.
  Designed as a CSS border-image (9-slice): the transparent middle is
  discarded by the browser, only the ring (4 corners + 4 stretched edges)
  is drawn around the card. Edit freely in Illustrator/Inkscape/Figma —
  keep the 200x200 canvas and the corner zones (0-34 / 166-200) intact so
  the border-image-slice: 34 rule in styles.css still lines up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="c-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b5a56"/>
      <stop offset="55%" stop-color="#38372f"/>
      <stop offset="100%" stop-color="#211f1a"/>
    </linearGradient>
    <linearGradient id="c-bevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8c6bd"/>
      <stop offset="100%" stop-color="#6b6a63"/>
    </linearGradient>
    <radialGradient id="c-gem" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="55%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </radialGradient>
    <mask id="c-ring">
      <rect width="200" height="200" rx="20" fill="#fff"/>
      <rect x="34" y="34" width="132" height="132" rx="10" fill="#000"/>
    </mask>
  </defs>

  <g mask="url(#c-ring)">
    <rect width="200" height="200" rx="20" fill="url(#c-stone)"/>
    <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="url(#c-bevel)" stroke-width="3" opacity="0.75"/>
    <rect x="30" y="30" width="140" height="140" rx="12" fill="none" stroke="#000" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Corner rivets -->
  <g fill="url(#c-bevel)">
    <circle cx="20" cy="20" r="5"/>
    <circle cx="180" cy="20" r="5"/>
    <circle cx="20" cy="180" r="5"/>
    <circle cx="180" cy="180" r="5"/>
  </g>

  <!-- Rarity gem, centered on the bottom edge -->
  <g transform="translate(100 183)">
    <path d="M0 -13 L11 0 L0 13 L-11 0 Z" fill="url(#c-gem)" stroke="#1e293b" stroke-width="2"/>
  </g>
</svg>
