<!--
  Card frame template — Legendary rarity. Uses a larger 40px slice (see
  .card-frame-legendary in src/styles.css) to leave room for the wing
  flourish in the top corners. Keep the 200x200 canvas if you replace this.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="l-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b4a1e"/>
      <stop offset="55%" stop-color="#402c11"/>
      <stop offset="100%" stop-color="#1f1508"/>
    </linearGradient>
    <linearGradient id="l-bevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <radialGradient id="l-gem" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <mask id="l-ring">
      <rect width="200" height="200" rx="20" fill="#fff"/>
      <rect x="34" y="34" width="132" height="132" rx="10" fill="#000"/>
    </mask>
    <filter id="l-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g mask="url(#l-ring)">
    <rect width="200" height="200" rx="20" fill="url(#l-stone)"/>
    <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="url(#l-bevel)" stroke-width="3.5" opacity="0.85"/>
    <rect x="30" y="30" width="140" height="140" rx="12" fill="none" stroke="#000" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Dragon-wing flourish, kept inside the corner slice box (0-40 / 160-200) -->
  <g fill="url(#l-bevel)" opacity="0.95">
    <path d="M8 8 L36 4 L26 16 L38 16 L22 24 L34 28 L16 30 L20 38 L8 26 Z"/>
    <path d="M192 8 L164 4 L174 16 L162 16 L178 24 L166 28 L184 30 L180 38 L192 26 Z"/>
  </g>

  <!-- Corner rivets -->
  <g fill="url(#l-bevel)">
    <circle cx="20" cy="20" r="5.5"/>
    <circle cx="180" cy="20" r="5.5"/>
    <circle cx="20" cy="180" r="5.5"/>
    <circle cx="180" cy="180" r="5.5"/>
  </g>

  <!-- Rarity gem, centered on the bottom edge, glowing -->
  <g transform="translate(100 182)" filter="url(#l-glow)">
    <path d="M0 -17 L14 0 L0 17 L-14 0 Z" fill="url(#l-gem)" stroke="#78350f" stroke-width="2"/>
  </g>
</svg>
