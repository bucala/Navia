<!--
  Card frame template — Rare rarity. See frame-common.svg for the
  border-image slicing notes; keep the 200x200 canvas and corner zones
  intact if you replace this file.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="r-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c3568"/>
      <stop offset="55%" stop-color="#2c1c45"/>
      <stop offset="100%" stop-color="#170f28"/>
    </linearGradient>
    <linearGradient id="r-bevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#7e5aa8"/>
    </linearGradient>
    <radialGradient id="r-gem" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="55%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7e22ce"/>
    </radialGradient>
    <mask id="r-ring">
      <rect width="200" height="200" rx="20" fill="#fff"/>
      <rect x="34" y="34" width="132" height="132" rx="10" fill="#000"/>
    </mask>
  </defs>

  <g mask="url(#r-ring)">
    <rect width="200" height="200" rx="20" fill="url(#r-stone)"/>
    <rect x="6" y="6" width="188" height="188" rx="16" fill="none" stroke="url(#r-bevel)" stroke-width="3" opacity="0.8"/>
    <rect x="30" y="30" width="140" height="140" rx="12" fill="none" stroke="#000" stroke-width="3" opacity="0.4"/>
  </g>

  <!-- Corner rivets -->
  <g fill="url(#r-bevel)">
    <circle cx="20" cy="20" r="5"/>
    <circle cx="180" cy="20" r="5"/>
    <circle cx="20" cy="180" r="5"/>
    <circle cx="180" cy="180" r="5"/>
  </g>

  <!-- Rarity gem, centered on the bottom edge -->
  <g transform="translate(100 183)">
    <path d="M0 -15 L12 0 L0 15 L-12 0 Z" fill="url(#r-gem)" stroke="#3b0764" stroke-width="2"/>
  </g>
</svg>
