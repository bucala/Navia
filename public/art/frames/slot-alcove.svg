<!--
  Recessed stone alcove frame for board unit slots (empty or occupied).
  Same border-image technique as the card frames — see frame-common.svg.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="a-stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0a08"/>
      <stop offset="12%" stop-color="#403c34"/>
      <stop offset="88%" stop-color="#26231d"/>
      <stop offset="100%" stop-color="#050403"/>
    </linearGradient>
    <mask id="a-ring">
      <rect width="200" height="200" rx="16" fill="#fff"/>
      <rect x="28" y="28" width="144" height="144" rx="8" fill="#000"/>
    </mask>
  </defs>
  <g mask="url(#a-ring)">
    <rect width="200" height="200" rx="16" fill="url(#a-stone)"/>
    <rect x="4" y="4" width="192" height="192" rx="14" fill="none" stroke="#9c9285" stroke-width="3" opacity="0.85"/>
    <rect x="14" y="14" width="172" height="172" rx="12" fill="none" stroke="#000" stroke-width="3" opacity="0.55"/>
  </g>
  <g fill="#9c9285" opacity="0.9">
    <circle cx="16" cy="16" r="4.5"/>
    <circle cx="184" cy="16" r="4.5"/>
    <circle cx="16" cy="184" r="4.5"/>
    <circle cx="184" cy="184" r="4.5"/>
  </g>
</svg>
